<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users Management | SKR INTERNATIONAL</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="dashboard.html">

<i class="bi bi-speedometer2 me-2"></i>

SKR INTERNATIONAL Admin

</a>

<div>

<a href="dashboard.html" class="btn btn-light me-2">

<i class="bi bi-house-fill"></i>

Dashboard

</a>

<button id="logoutBtn" class="btn btn-warning">

<i class="bi bi-box-arrow-right"></i>

Logout

</button>

</div>

</div>

</nav>

<!-- Users Section -->

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>

<i class="bi bi-people-fill text-primary"></i>

Registered Users

</h2>

<span class="badge bg-primary fs-6">

Total:
<span id="totalUsers">0</span>

</span>

</div>

<div class="card shadow">

<div class="card-body">

<div class="table-responsive">

<table class="table table-striped table-hover align-middle">

<thead class="table-dark">

<tr>

<th>#</th>

<th>Name</th>

<th>Email</th>

<th>UID</th>

</tr>

</thead>

<tbody id="usersTable">

<tr>

<td colspan="4" class="text-center">

Loading users...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>
<footer class="bg-dark text-white text-center py-3">
  <p class="mb-0">© 2026 SKR INTERNATIONAL</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const tbody = document.getElementById("usersTable");
const totalUsers = document.getElementById("totalUsers");

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  try {

    const querySnapshot = await getDocs(collection(db, "users"));

    tbody.innerHTML = "";

    let count = 0;

    querySnapshot.forEach((doc) => {

      count++;

      const data = doc.data();

      tbody.innerHTML += `
        <tr>
          <td>${count}</td>
          <td>${data.name || "-"}</td>
          <td>${data.email || "-"}</td>
          <td>${doc.id}</td>
        </tr>
      `;

    });

    totalUsers.textContent = count;

    if (count === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="4" class="text-center">
            No users found.
          </td>
        </tr>
      `;
    }

  } catch (error) {
    alert(error.message);
  }

});

document.getElementById("logoutBtn").addEventListener("click", async () => {

  await signOut(auth);

  window.location.href = "login.html";

});

</script>

</body>
</html>
